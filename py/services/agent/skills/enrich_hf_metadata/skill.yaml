name: enrich_hf_metadata
title: "Enrich Metadata from HuggingFace"
description: >
  Parse the HuggingFace model card via LLM to extract description, trigger
  words, base model, tags, and preview image URL.  Updates .metadata.json
  and downloads the preview thumbnail.
llm_required: true
model_type_filter: ["lora", "checkpoint", "embedding"]
input_schema:
  type: object
  properties:
    model_paths:
      type: array
      items:
        type: string
  required:
    - model_paths
output_schema:
  type: object
  properties:
    model_path:
      type: string
    base_model:
      type: string
    trigger_words:
      type: array
      items:
        type: string
    description:
      type: string
    tags:
      type: array
      items:
        type: string
    preview_url:
      type: string
    confidence:
      type: string
      enum: ["high", "medium", "low"]
  required:
    - model_path
    - confidence
permissions:
  write_metadata: true
  write_previews: true
  network_domains:
    - "huggingface.co"
